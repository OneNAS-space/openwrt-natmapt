permissions:
  contents: write 
name: Build OpenWrt Package

on:
  push:
    branches:
      - master
    paths:
      - 'files/**'
      - '!**/.github/**'
  workflow_dispatch:
  workflow_run:
    workflows: ["Calculating PKG_MIRROR_HASH"]
    types:
      - completed

jobs:
  check:
    name: 1. Check if build is required
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, 'Update-PKG_MIRROR_HASH')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.name == 'Calculating PKG_MIRROR_HASH')
    outputs:
      should_build: ${{ steps.check_release.outputs.should_build }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      main_version: ${{ steps.version.outputs.main_version }}
      main_full_version: ${{ steps.version.outputs.main_full_version }}
      scripts_version: ${{ steps.version.outputs.scripts_version }}

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v6

      - name: 🏷️ Extract version info from Makefile
        id: version
        run: |
          PKG_VERSION=$(grep -E '^PKG_UPSTREAM_VERSION *:?=' Makefile | head -n1 | cut -d= -f2 | tr -d '[:space:]')
          PKG_RELEASE=$(grep -E '^PKG_RELEASE *:?=' Makefile | head -n1 | cut -d= -f2 | tr -d '[:space:]')
          COMBINED_VERSION="${PKG_VERSION}-${PKG_RELEASE}"
          
          echo "tag_name=v${COMBINED_VERSION}" >> "$GITHUB_OUTPUT"
          echo "main_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "main_full_version=$COMBINED_VERSION" >> "$GITHUB_OUTPUT"
          
          SCRIPTS_VERSION=$(grep -E '^SCRIPTS_VERSION *:?=' Makefile | head -n1 | cut -d= -f2 | tr -d '[:space:]')
          echo "scripts_version=$SCRIPTS_VERSION" >> "$GITHUB_OUTPUT"

      - name: 🧐 Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag_name }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual run detected. Forcing build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG does not exist. Proceeding with build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: 2. Build natmapt for ${{ matrix.version }} / ${{ matrix.target }}
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: openwrt-24.10
            target: x86_64
            index: 0
          - version: openwrt-24.10
            target: aarch64_cortex-a53
            index: 1
          - version: openwrt-24.10
            target: arm_cortex-a7_neon-vfpv4
            index: 2
          - version: openwrt-25.12
            target: x86_64
            index: 3
          - version: openwrt-25.12
            target: aarch64_cortex-a53
            index: 4
          - version: openwrt-25.12
            target: arm_cortex-a7_neon-vfpv4
            index: 5

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v6

      - name: 📛 Extract PKG_NAME from Makefile
        run: |
          PKG_NAME=$(grep -E '^PKG_NAME[:?]?=' Makefile | head -n1 | sed -E 's/PKG_NAME[:?]?= *//')
          echo "PKG_NAME=$PKG_NAME" >> "$GITHUB_ENV"
          echo "ARCH=${{ matrix.target }}-${{ matrix.version }}" >> "$GITHUB_ENV"

      - name: 🧰 Set up openwrt-netmapt feed structure
        run: |
          set -e
          mkdir -p feed/jackie264
          printf 'include $(TOPDIR)/feed/jackie264/*/Makefile\n' > feed/jackie264/custom.mk

          rsync -av \
            --exclude='.git' \
            --exclude='feed' \
            --exclude='.github' \
            --exclude='LICENSE' \
            --exclude='README.md' \
            --exclude='SECURITY.md' \
            ./ feed/jackie264/${PKG_NAME}/

      - name: 🏗️ Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v10
        env:
          ARCH: ${{ env.ARCH }}
          FEEDNAME: jackie264
          PACKAGES: ${{ env.PKG_NAME }}
          INDEX: 0
          FEED_DIR: ${{ github.workspace }}/feed
          NO_SHFMT_CHECK: 1
          NO_REFRESH_CHECK: 1
          
      - name: 🔍 Debug build output
        run: |
          echo "=== Build directory structure ==="
          find . -name "*.ipk" -type f 2>/dev/null || echo "No .ipk files found"
          echo "=== bin directory structure ==="
          ls -la bin/ 2>/dev/null || echo "No bin directory found"
          if [ -d "bin/packages" ]; then
            echo "=== packages directory structure ==="
            find bin/packages/ -type f -name "*.ipk" 2>/dev/null || echo "No .ipk files in packages directory"
            echo "=== Full packages directory tree ==="
            ls -laR bin/packages/ 2>/dev/null || echo "No packages directory"
          fi

      - name: 📦 Prepare and Rename APK artifacts
        run: |
          find bin/packages/ -name "*.apk" | while read -r f; do
            mv "$f" "${f%.apk}-${{ matrix.target }}.apk"
          done

      - name: 🧹 Collect arch and common artifacts
        run: |
          set -euo pipefail
          mkdir -p "artifact-arch" "artifact-common"

          find bin/packages -type f \( -name "*.ipk" -o -name "*.apk" \) | while read -r f; do
            base=$(basename "$f")
            if [[ "$base" == *"-script-"* ]] || [[ "$base" =~ _all\.ipk$ ]]; then
              echo "📦 Detected Common package: $base"
              cp -a "$f" "artifact-common/"
            else
              echo "🏗️ Detected Arch package: $base"
              cp -a "$f" "artifact-arch/"
            fi
          done

      - name: 📦 Upload arch artifact
        uses: actions/upload-artifact@v7
        with:
          name: natmapt-${{ matrix.target }}-${{ matrix.version }}
          path: artifact-arch/

      - name: 📦 Upload common artifact (only once)
        if: ${{ matrix.index == 0 }}
        uses: actions/upload-artifact@v7
        with:
          name: natmapt-common-${{ matrix.version }}
          path: artifact-common/

  release:
    name: 3. Release ${{ github.repository }}
    needs: [check, build]
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v6
      
      - name: ⬇️ Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-assets

      - name: 🗃️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.main_full_version }}
          name: Build-v${{ needs.check.outputs.main_full_version }}
          files: |
            ./release-assets/**/natmapt*.ipk
            ./release-assets/**/natmapt*.apk
          draft: false
          prerelease: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔑 Checkout custom-packages repo
        uses: actions/checkout@v6
        with:
          repository: OneNAS-space/custom-packages
          token: ${{ secrets.CUSTOM_PACKAGES_TOKEN }}
          path: custom-packages

      - name: 📂 Copy artifacts into repo (Precision Versioning)
        run: |
          set -euo pipefail

          find ./release-assets -mindepth 1 -maxdepth 1 -type d | while read -r dir; do
            bn=$(basename "$dir")
            if [[ "$bn" == *"-24.10" ]]; then
              ver_dir="24.10"
            else
              ver_dir="25.12"
            fi

            if [[ "$bn" == *"common"* ]]; then
              arch="common"
            else
              arch=$(echo "$bn" | sed -E 's/^natmapt-(.+)-openwrt-.*/\1/')
            fi

            dest_root="custom-packages/$ver_dir/$arch"
            mkdir -p "$dest_root"

            find "$dir" -type f \( -name "*.ipk" -o -name "*.apk" \) | while read -r f; do
              base=$(basename "$f")
              if [[ "$base" == *.ipk ]]; then
                pkgname=$(echo "$base" | sed -E 's/^([^_]+)_.*$/\1/')
                rm -f "$dest_root/${pkgname}"*.ipk
                cp -a "$f" "$dest_root/"
                echo "✅ [IPK] $base -> $dest_root"
                ls -la "$dest_root/${pkgname}"* || echo "No IPKs found"

              elif [[ "$base" == *.apk ]]; then
                standard_name=$(echo "$base" | sed "s/-$arch//")
                pkgname=$(echo "$standard_name" | cut -d- -f1)
                
                rm -f "$dest_root/${pkgname}"*.apk
                cp -a "$f" "$dest_root/$standard_name"
                echo "✅ [APK] $base (as $standard_name) -> $dest_root"
                ls -la "$dest_root/${pkgname}"* || echo "No APKs found"
              fi
            done
          done

      - name: 🚚 Update pkg artifacts
        run: |
          set -e
          cd custom-packages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          CHANGED=$(git diff --cached --name-only || true)

          MAIN_CHANGED=$(git status --short | grep -E '.*natmapt_.*\.ipk|.*natmapt-.*\.apk' || true)
          SUB_CHANGED=$(git status --short | grep -E '.*natmapt-(client|notify).*_all\.ipk|.*natmapt-(client|notify).*\.apk' || true)

          if [ -n "$MAIN_CHANGED" ] && [ -n "$SUB_CHANGED" ]; then
            COMMIT_MSG="Update to v${{ needs.check.outputs.main_full_version }} + scripts v${{ needs.check.outputs.scripts_version }}"
          elif [ -n "$MAIN_CHANGED" ]; then
            COMMIT_MSG="Update to v${{ needs.check.outputs.main_full_version }}"
          elif [ -n "$SUB_CHANGED" ]; then
            COMMIT_MSG="Update to v${{ needs.check.outputs.scripts_version }}"
          else
            COMMIT_MSG="Routine update for natmapt"
          fi

          git commit -m "$COMMIT_MSG" || echo "No changes"
          for i in {1..5}; do
            echo "Attempt $i: Pushing to custom-packages..."
            git pull --rebase origin main && \
            git push origin main && echo "✅ Push successful!" && break || \
            (echo "⚠️ Conflict detected, retrying in 5s..." && sleep 5)
          done
